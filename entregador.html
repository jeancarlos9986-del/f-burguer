<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel do Entregador - F&B Burguer</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F&B Entregas">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1048/1048329.png">

    <style>
        /* FUNDO DA PÁGINA */
        body {
            background-color: #121212 !important;
            color: #ffffff !important;
            font-family: sans-serif;
            padding: 10px;
            /* Previne comportamentos indesejados de toque em apps */
            touch-action: manipulation;
            user-select: none;
        }

        /* BARRA DE AVISO DE INSTALAÇÃO */
        #aviso-instalar {
            display: none;
            background: #ff9800;
            color: #000;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 9999;
            font-size: 0.9rem;
            border-radius: 5px;
            margin-bottom: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
        }

        /* O CARD DE ENTREGA */
        .card-entrega {
            background-color: #f8f9fa !important;
            border: 3px solid #000000 !important;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #000000 !important;
        }

        /* A ÁREA DE VALOR E PAGAMENTO */
        .info-valor {
            background-color: #ffffff !important;
            border: 2px solid #ff9800 !important;
            padding: 10px;
            margin: 10px 0;
            color: #000000 !important;
        }

        /* TEXTOS INTERNOS DOS CARDS */
        .info-valor p,
        .info-valor strong,
        .card-entrega p,
        .card-entrega h3 {
            color: #000000 !important;
            display: block;
            font-weight: bold !important;
            margin: 5px 0;
        }

        .info-valor strong {
            font-size: 1.4rem !important;
            color: #d32f2f !important;
        }

        /* BOTÕES */
        .btn-rota {
            background-color: #1a73e8 !important;
            color: white !important;
            display: block;
            padding: 18px;
            /* Botão maior para facilitar o toque */
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-concluir {
            background-color: #2e7d32 !important;
            color: white !important;
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .title {
            background-color: #ff9800 !important;
            color: black !important;
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }

        .sem-pedidos {
            text-align: center;
            margin-top: 30px;
            font-size: 1.1rem;
            opacity: 0.8;
        }
    </style>

    <script>
        // Registro do Service Worker
        if ('service-worker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('App pronto:', reg.scope))
                    .catch(err => console.log('Erro no registro:', err));
            });
        }

        // Lógica para mostrar aviso de instalação apenas em celulares e se não for App
        document.addEventListener('DOMContentLoaded', () => {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isMobile && !isStandalone) {
                document.getElementById('aviso-instalar').style.display = 'block';
            }
        });
    </script>
</head>

<body>

    <div id="aviso-instalar">
        📢 Toque nos 3 pontinhos (ou compartilhar) e selecione "Instalar" ou "Tela de Início"
    </div>

    <header>
        <h1 class="title">📦 ENTREGAS PENDENTES</h1>
    </header>

    <main id="lista-entregas">
        <div class="sem-pedidos">Carregando entregas...</div>
    </main>

    <script type="module" src="entregador.js"></script>
</body>

</html>
